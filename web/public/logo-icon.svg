    <rect x="1"  y="61" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="21" y="61" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="41" y="61" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="61" y="61" width="17" height="17" rx="3" fill="#c8a04a" />
    <rect x="81" y="61" width="17" height="17" rx="3" fill="#c8a04a" />
