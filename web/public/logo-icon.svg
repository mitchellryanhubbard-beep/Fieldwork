    <rect x="81" y="1"  width="17" height="17" rx="3" fill="#1d3a52" />
    <!-- Row 2 -->
    <rect x="1"  y="21" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="21" y="21" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="41" y="21" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="61" y="21" width="17" height="17" rx="3" fill="#1d3a52" />
    <rect x="81" y="21" width="17" height="17" rx="3" fill="#1d3a52" />
    <!-- Row 3 -->
